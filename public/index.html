<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>60 日新高新低比例</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #333; }
    .header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header .updated { font-size: 13px; color: #888; }
    .controls {
      display: flex;
      gap: 8px;
      padding: 16px 24px 8px;
    }
    .btn {
      padding: 6px 18px;
      border: 1.5px solid #2979c8;
      border-radius: 20px;
      background: #fff;
      color: #2979c8;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { background: #e8f0fb; }
    .btn.active { background: #2979c8; color: #fff; }
    .charts { padding: 0 24px 32px; }
    .chart-wrap { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 16px; padding: 8px; }
    .chart-title { font-size: 14px; font-weight: 600; color: #555; padding: 8px 8px 0; }
    .loading { text-align: center; padding: 80px; color: #aaa; font-size: 16px; }
    .error { text-align: center; padding: 80px; color: #e53935; font-size: 15px; }
  </style>
</head>
<body>

<div class="header">
  <h1>台灣股市 60 日新高新低比例</h1>
  <span class="updated" id="updated-at"></span>
</div>

<div class="controls">
  <button class="btn" onclick="setRange(1,  this)">1 年</button>
  <button class="btn active" onclick="setRange(3,  this)">3 年</button>
  <button class="btn" onclick="setRange(5,  this)">5 年</button>
  <button class="btn" onclick="setRange(10, this)">10 年</button>
</div>

<div class="charts">
  <div id="status" class="loading">資料載入中…</div>
  <div class="chart-wrap" id="wrap-price" style="display:none">
    <div class="chart-title">加權指數（收盤）</div>
    <div id="chart-price"></div>
  </div>
  <div class="chart-wrap" id="wrap-ratio" style="display:none">
    <div class="chart-title">60 日新高家數比例 / 新低家數比例</div>
    <div id="chart-ratio"></div>
  </div>
</div>

<script>
let allData = [];
let currentYears = 3;

async function loadData() {
  try {
    const r = await fetch('/api/data');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    allData = await r.json();
    if (!allData.length) throw new Error('No data');

    const last = allData[allData.length - 1];
    document.getElementById('updated-at').textContent =
      '最後更新：' + last.date;

    document.getElementById('status').style.display = 'none';
    document.getElementById('wrap-price').style.display = '';
    document.getElementById('wrap-ratio').style.display = '';

    renderCharts(currentYears);
  } catch (e) {
    document.getElementById('status').className = 'error';
    document.getElementById('status').textContent = '資料載入失敗：' + e.message;
  }
}

function setRange(years, btn) {
  currentYears = years;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCharts(years);
}

function filterByYears(data, years) {
  const cutoff = new Date();
  cutoff.setFullYear(cutoff.getFullYear() - years);
  const cutStr = cutoff.toISOString().slice(0, 10);
  return data.filter(d => d.date >= cutStr);
}

function renderCharts(years) {
  const data = filterByYears(allData, years);
  const dates = data.map(d => d.date);
  const taiex = data.map(d => parseFloat(d.taiex_close));
  const highR = data.map(d => parseFloat(d.high_ratio));
  const lowR  = data.map(d => parseFloat(d.low_ratio));

  // ── Price chart ──
  Plotly.react('chart-price', [
    {
      x: dates, y: taiex,
      type: 'scatter', mode: 'lines',
      line: { color: '#1565c0', width: 1.5 },
      name: 'TAIEX',
      hovertemplate: '%{x}<br>收盤：%{y:,.0f}<extra></extra>',
    }
  ], {
    margin: { t: 8, b: 40, l: 60, r: 20 },
    height: 260,
    xaxis: { showgrid: false, zeroline: false },
    yaxis: { showgrid: true, gridcolor: '#f0f0f0', zeroline: false, tickformat: ',.0f' },
    plot_bgcolor: '#fff',
    paper_bgcolor: '#fff',
    hovermode: 'x unified',
    showlegend: false,
  }, { responsive: true, displayModeBar: false });

  // ── High/Low ratio chart ──
  Plotly.react('chart-ratio', [
    {
      x: dates, y: highR,
      type: 'scatter', mode: 'lines',
      line: { color: '#e53935', width: 1.5 },
      name: '創 60 日新高 %',
      fill: 'tozeroy',
      fillcolor: 'rgba(229,57,53,0.08)',
      hovertemplate: '%{x}<br>新高：%{y:.1f}%<extra></extra>',
    },
    {
      x: dates, y: lowR,
      type: 'scatter', mode: 'lines',
      line: { color: '#43a047', width: 1.5 },
      name: '創 60 日新低 %',
      fill: 'tozeroy',
      fillcolor: 'rgba(67,160,71,0.08)',
      hovertemplate: '%{x}<br>新低：%{y:.1f}%<extra></extra>',
    }
  ], {
    margin: { t: 8, b: 40, l: 60, r: 20 },
    height: 300,
    xaxis: { showgrid: false, zeroline: false },
    yaxis: { showgrid: true, gridcolor: '#f0f0f0', zeroline: false, ticksuffix: '%' },
    plot_bgcolor: '#fff',
    paper_bgcolor: '#fff',
    hovermode: 'x unified',
    legend: { orientation: 'h', y: 1.05 },
  }, { responsive: true, displayModeBar: false });
}

loadData();
</script>
</body>
</html>
